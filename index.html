<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="icono-biblia.ico">
    <title>Biblia Cristiana - Inicio</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        button {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            background: #34495e;
        }
        .contenedor-boton {
            display: flex;          /* Activa el modo flexible */
            flex-wrap: wrap;       /* Si no caben, saltan de línea automáticamente */
            justify-content: center; /* Los centra horizontalmente */
            gap: 10px;             /* Crea un espacio uniforme entre ellos (adiós botones pegados) */
            max-width: 800px;      /* Ajusta esto según el ancho de tu card blanca */
            margin: 20px auto;     /* Los separa del texto de arriba y los centra */
        }

        .contenedor-boton button {
            flex: 1 1 150px;       /* Esto hace que todos intenten medir lo mismo (mínimo 150px) */
            max-width: 200px;      /* Evita que se estiren demasiado si hay pocos botones */
            padding: 10px;         /* Espacio interno para que se vean cómodos */
            /* Aquí puedes añadir tus estilos de color y bordes que ya tienes */
        }
    </style>
    
</head>
<body>
    <div class="card">
        <h1>Biblia Cristiana</h1>
        <p>Esta biblia aún está en desarrollo. Por ahora puedes explorar Proverbios.</p>
        <div class="contenedor-boton">
            <button onclick="window.location.href='proberbios1.html'">Ir al Capítulo 1</button>
            <button onclick="window.location.href='proberbios2.html'">Ir al Capítulo 2</button>
            <button onclick="window.location.href='proberbios3.html'">Ir al Capítulo 3</button>
            <button onclick="window.location.href='proberbios4.html'">Ir al Capítulo 4</button>
            <button onclick="window.location.href='proberbios5.html'">Ir al Capítulo 5</button>
            <button onclick="window.location.href='proberbios6.html'">Ir al Capítulo 6</button>
            <button onclick="window.location.href='proberbios7.html'">Ir al Capítulo 7</button>
            <button onclick="window.location.href='proberbios8.html'">Ir al Capítulo 8</button>
            <button onclick="window.location.href='proberbios9.html'">Ir al Capítulo 9</button>
            <button onclick="window.location.href='proberbios10.html'">Ir al Capítulo 10</button>
        </div>
    </div>
</body>
</html>
